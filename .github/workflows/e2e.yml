name: E2E

# End-to-end tests: run the real app and drive it with Playwright (Chromium).
# Heavier than the unit/component jobs (it builds + serves the WASM app and
# downloads a browser), so it lives in its own workflow.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install WebAssembly tools
        run: dotnet workload install wasm-tools

      - name: Build the E2E project (restores Playwright)
        run: dotnet build tests/WorkPlanStudio.E2E/WorkPlanStudio.E2E.csproj -c Release

      - name: Install Playwright browsers
        run: pwsh tests/WorkPlanStudio.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start the app
        run: |
          nohup dotnet run --project src/WorkPlanStudio/WorkPlanStudio.csproj --launch-profile http > app.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -sf http://localhost:5235 > /dev/null; then echo "app is up"; exit 0; fi
            sleep 2
          done
          echo "app did not start in time"; cat app.log; exit 1

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:5235
          E2E_ARTIFACTS: ${{ github.workspace }}/e2e-artifacts
        run: dotnet test tests/WorkPlanStudio.E2E/WorkPlanStudio.E2E.csproj -c Release --no-build

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e-artifacts
          if-no-files-found: ignore
