version: 2
updates:
  # NuGet — versions live in Directory.Packages.props (central package management).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"

  # Keep the GitHub Actions in the workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
